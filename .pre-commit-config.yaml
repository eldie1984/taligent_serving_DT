# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  # 1. Ruff: Handles Linting, Auto-fixing, and Formatting all-in-one
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14 
    hooks:
      - id: ruff
        args: [ --fix ] # Automatically fixes lint violations (like unused imports)
      - id: ruff-format # Replaces Black entirely

  # 2. Poetry: Ensures your pyproject.toml is healthy and consistent
  - repo: https://github.com/python-poetry/poetry
    rev: '2.4.1'  
    hooks:
      - id: poetry-check
      - id: poetry-lock

  # 3. Mypy: Type checking with your Redis stubs injected
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0  
    hooks:
      - id: mypy
        additional_dependencies: [
          'types-redis'
        ]
  - repo: https://github.com/koyeung/ko-poetry-audit-plugin
    rev: 0.8.0a1  # Safe stable version tag
    hooks:
      - id: poetry-audit
        args: []

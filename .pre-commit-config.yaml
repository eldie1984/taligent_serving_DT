# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  # 1. Ruff: Handles Linting, Auto-fixing, and Formatting all-in-one
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14 
    hooks:
      - id: ruff
        args: [ --fix ]
      - id: ruff-format

  # 2. Poetry: Ensures your pyproject.toml is healthy and consistent
  - repo: https://github.com/python-poetry/poetry
    rev: '2.4.1'  
    hooks:
      - id: poetry-check
      - id: poetry-lock

  # 3. Mypy: Run locally through Poetry so it inherits your actual dependencies
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: poetry run mypy
        language: system
        types: [python]

  - repo: https://github.com/koyeung/ko-poetry-audit-plugin
    rev: 0.8.0a1  
    hooks:
      - id: poetry-audit
        args: []

  # 4. Local Hooks: Security audits and test coverage
  - repo: local
    hooks:
    - id: pytest-coverage
      name: Run Pytest with Coverage
      entry: poetry run pytest tests/ --cov=. --cov-report=term-missing --cov-fail-under=55
      language: system
      pass_filenames: false
      always_run: true